server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: customer-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cbs_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: CustomerServicePool

  jpa:
    hibernate:
      ddl-auto: update          # Flyway owns the schema — Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                   # wait for all replicas — critical for financial events
      retries: 3
      properties:
        enable.idempotence: true  # exactly-once producer semantics
        max.in.flight.requests.per.connection: 1

# Kafka topic names
kafka:
  topics:
    customer-registered: customer.registered
    kyc-status-changed:  customer.kyc.status.changed
    customer-updated:    customer.profile.updated

# Spring Security — permit actuator + trust gateway-forwarded JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080/auth}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.cbs.customer: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN