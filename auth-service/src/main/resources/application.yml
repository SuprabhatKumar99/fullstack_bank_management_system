server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: auth-service

  # ── PostgreSQL ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cbs_auth}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:root}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: AuthHikariPool

  jpa:
    hibernate:
      ddl-auto: update          # Flyway owns the schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ──────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis (refresh-token store) ──────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          min-idle: 2

  # ── Kafka ────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1

# ── JWT Configuration ─────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-must-be-at-least-32-characters-long}
  access-token-expiry-ms: 900000          # 15 minutes
  refresh-token-expiry-ms: 604800000      # 7 days
  issuer: cbs-auth-service

# ── Kafka Topics ──────────────────────────────────────────────
kafka:
  topics:
    auth-events: auth.events

# ── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when_authorized

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    com.suprab.cbs.auth: DEBUG
    org.springframework.security: INFO
    io.jsonwebtoken: WARN