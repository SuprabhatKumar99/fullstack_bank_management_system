version: "3.9"

# ── Auth Service Stack ─────────────────────────────────────────
# Starts: PostgreSQL (auth schema) + Redis + Kafka + Auth Service
# Run: docker compose up -d
# ──────────────────────────────────────────────────────────────

services:

  # ── Auth Service ─────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbs-auth-service
    ports:
      - "8080:8080"
    environment:
      DB_HOST:      postgres-auth
      DB_PORT:      5432
      DB_NAME:      cbs_auth
      DB_USER:      postgres
      DB_PASS:      root
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      KAFKA_BOOTSTRAP: kafka:9092
      JWT_SECRET:   "change-this-in-production-must-be-at-least-32-chars"
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - cbs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── PostgreSQL (auth schema) ──────────────────────────────────
  postgres-auth:
    image: postgres:16-alpine
    container_name: cbs-postgres-auth
    environment:
      POSTGRES_DB:       cbs_auth
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"           # 5433 to avoid conflict with other CBS postgres instances
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - cbs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbs_user -d cbs_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cbs-redis-auth
    ports:
      - "6380:6379"           # 6380 to avoid conflict
    volumes:
      - redis-auth-data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - cbs-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper ────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: cbs-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    networks:
      - cbs-network

  # ── Kafka ─────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cbs-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    networks:
      - cbs-network

volumes:
  postgres-auth-data:
  redis-auth-data:

networks:
  cbs-network:
    driver: bridge
    name: cbs-network          # shared with other CBS services when running together